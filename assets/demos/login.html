<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite School System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 16px;
  width: 320px;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

#app {
  display: none;
  height: 100vh;
  display: flex;
}

.sidebar {
  width: 230px;
  background: #020617;
  padding: 20px;
}

.sidebar div {
  margin: 10px 0;
  cursor: pointer;
  padding: 8px;
}

.sidebar div:hover {
  background: rgba(255,255,255,0.05);
}

.main {
  flex: 1;
  padding: 30px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 10px;
}

.blue {border-left: 4px solid #3b82f6;}
.purple {border-left: 4px solid #8b5cf6;}
.green {border-left: 4px solid #22c55e;}
.orange {border-left: 4px solid #f59e0b;}

.btn {
  margin-top: 10px;
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th {
  text-align: left;
  padding: 12px;
  color: #94a3b8;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

td {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.A {color:#22c55e;}
.B {color:#3b82f6;}
.C {color:#f59e0b;}
.D {color:#ef4444;}

.active {color:#22c55e;}
.leave {color:#f59e0b;}
.duty {color:#06b6d4;}

/* 📱 MOBILE FIX */
@media (max-width: 768px) {

  #app {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
  }

  .sidebar h2 {
    display: none; /* hide big title on small screens */
  }

  .sidebar div {
    flex: 0 0 auto;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 10px 14px;
    white-space: nowrap;
  }

  .main {
    padding: 15px;
  }

  .cards {
    grid-template-columns: 1fr; /* stack cards */
  }

  table {
    font-size: 14px;
  }

  th, td {
    padding: 8px;
  }

  .login-box {
    width: 90%;
  }

}
</style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h2>Elite School System</h2>
    <p style="font-size:12px;">Demo: Enter any Email/Password</p>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div id="app">

<div class="sidebar">
  <h2>Elite School System</h2>
  <div onclick="load('dashboard')">Dashboard</div>
  <div onclick="load('students')">Students</div>
  <div onclick="load('exams')">Exams</div>
  <div onclick="load('finance')">Financials</div>
  <div onclick="load('staff')">Staff</div>
</div>

<div class="main" id="main"></div>

</div>

<script>

function enter(){
  login.style.display="none";
  app.style.display="flex";
  load('dashboard');
}

function load(p){
  if(p==='dashboard') dashboard();
  if(p==='students') students();
  if(p==='exams') exams();
  if(p==='finance') finance();
  if(p==='staff') staff();
}

const school = {
  1:["John Kamau","Amina Yusuf","Brian Otieno"],
  2:["Grace Wanjiku","Daniel Kim","Sophia Martinez"],
  3:["Ethan Mwangi","Noah Kariuki","Liam Otieno"]
};

function dashboard(){
  main.innerHTML=`
  <h1>Dashboard</h1>
  <div class="cards">
    <div class="card blue">Students<br><h2>1,284</h2></div>
    <div class="card purple">Staff<br><h2>86</h2></div>
    <div class="card green">Revenue<br><h2>$482K</h2></div>
    <div class="card orange">Events<br><h2>12</h2></div>
  </div>
  `;
}

/* STUDENTS */
function students(){
  let html=`<h1>Students</h1>`;
  for(let g in school){
    html+=`<div class="card purple" onclick="showClass(${g})">Grade ${g}</div>`;
  }
  main.innerHTML=html;
}

function showClass(g){
  let html=`<h1>Grade ${g}</h1><button class="btn" onclick="students()">Back</button><table><tr><th>Student Name</th></tr>`;
  school[g].forEach(name=>{
    html+=`<tr><td>${name}</td></tr>`;
  });
  html+=`</table>`;
  main.innerHTML=html;
}

/* EXAMS (UPDATED) */
function exams(){
  let html=`<h1>Exams</h1>`;
  for(let g in school){
    html+=`<div class="card green" onclick="showExamClass(${g})">Grade ${g}</div>`;
  }
  main.innerHTML=html;
}

function showExamClass(g){
  let html=`
    <h1>Grade ${g} Exams</h1>
    <button class="btn" onclick="exams()">Back</button>
  `;

  school[g].forEach(name=>{
    html+=`
      <div class="card green">
        <strong>${name}</strong><br>
        <button class="btn" onclick="showExam('${name}',${g})">View Grades</button>
      </div>
    `;
  });

  main.innerHTML=html;
}

function showExam(name,g){
  main.innerHTML=`
  <h1>${name}</h1>
  <button class="btn" onclick="showExamClass(${g})">Back</button>

  <table>
    <thead>
      <tr>
        <th>Subject</th>
        <th>Score</th>
        <th>Grade</th>
      </tr>
    </thead>
    <tbody>
      ${row("Math")}
      ${row("English")}
      ${row("Science")}
      ${row("History")}
    </tbody>
  </table>
  `;
}

function row(subject){
  let score=Math.floor(60+Math.random()*40);
  let grade=score>=80?"A":score>=70?"B":score>=60?"C":"D";

  return `
  <tr>
    <td>${subject}</td>
    <td>${score}</td>
    <td class="${grade}">${grade}</td>
  </tr>`;
}

/* FINANCE */
function finance(){
  let html=`<h1>Financials</h1>`;
  ["Grace Wanjiku","Brian Otieno","Amina Yusuf"].forEach(s=>{
    html+=`
    <div class="card orange">
      ${s}
      <button class="btn" onclick="viewFinance('${s}')">View Payments</button>
    </div>`;
  });
  main.innerHTML=html;
}

function viewFinance(name){
  main.innerHTML=`
  <h1>${name}</h1>
  <button class="btn" onclick="finance()">Back</button>
  <table>
    <tr><th>Month</th><th>Amount</th></tr>
    <tr><td>Jan</td><td>$300</td></tr>
    <tr><td>Feb</td><td>$300</td></tr>
    <tr><td>Mar</td><td>$300</td></tr>
  </table>`;
}

/* STAFF */
function staff(){
  let list=[
    {name:"Mr Otieno",role:"Teacher",status:"active"},
    {name:"Mrs Wanjiku",role:"Principal",status:"duty"},
    {name:"Mr Kim",role:"Admin",status:"leave"}
  ];

  let html=`<h1>Staff</h1><table>
  <tr><th>Name</th><th>Role</th><th>Status</th></tr>`;

  list.forEach(s=>{
    html+=`
    <tr>
      <td>${s.name}</td>
      <td>${s.role}</td>
      <td class="${s.status}">${s.status}</td>
    </tr>`;
  });

  html+=`</table>`;
  main.innerHTML=html;
}

</script>

</body>
</html>
