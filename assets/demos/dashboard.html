<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FirmSys Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{display:flex;min-height:100vh;background:#f0f2f5;}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:linear-gradient(180deg,#1f2a38,#34495e);
  color:#fff;
  padding:25px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.sidebar h2{margin-bottom:30px;}
.sidebar p{
  padding:10px;
  margin-bottom:10px;
  cursor:pointer;
  border-radius:6px;
}
.sidebar p:hover{background:rgba(255,255,255,0.1);}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:220px;
  right:0;
  height:60px;
  background:#fff;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:0 20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  z-index:100;
}
.account{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  position:relative;
}
.account img{
  width:36px;
  height:36px;
  border-radius:50%;
}
.dropdown{
  display:none;
  position:absolute;
  top:50px;
  right:0;
  background:#fff;
  border-radius:8px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  overflow:hidden;
}
.dropdown p{
  padding:10px 15px;
  cursor:pointer;
}
.dropdown p:hover{background:#f0f0f0;}

/* MAIN CONTENT */
.main{
  flex:1;
  margin-left:220px;
  padding:90px 30px 30px 30px;
  overflow-y:auto;
  max-height:100vh;
}
h1{margin-bottom:20px;color:#2c3e50;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.3s;
}
.card:hover{transform:translateY(-5px);}

/* CHART */
.chart-container{
  margin-top:30px;
  background:#fff;
  padding:20px;
  border-radius:12px;
  max-height:400px;
}

/* BUTTON */
button{
  margin-bottom:20px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  body{flex-direction:column;}
  .sidebar{
    width:100%;
    display:flex;
    justify-content:space-around;
  }
  .topbar{left:0;padding:0 15px;}
  .main{margin-left:0;padding:100px 15px 15px 15px;}
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>FirmSys</h2>
  <div>
    <p onclick="renderDashboard()">Dashboard</p>
    <p onclick="renderProjects()">Projects</p>
    <p onclick="renderReports()">Reports</p>
  </div>
</div>

<div class="topbar">
  <div class="account" onclick="toggleDropdown()">
    <img src="https://i.pravatar.cc/36" alt="Account">
    <span>Admin</span>
    <div class="dropdown" id="dropdown">
      <p>Profile</p>
      <p>Settings</p>
      <p>Logout</p>
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<script>
// DEMO DATA
const data = {
  projects: [
    {name:"Road Survey", status:"Active"},
    {name:"GIS Mapping", status:"Completed"},
    {name:"Urban Planning", status:"Active"},
    {name:"Hydrology Study", status:"Completed"}
  ],
  clients: ["KenGen","Safaricom","UN Habitat","County Gov","World Bank"],
  revenue: 92000,
  tasks: ["Prepare report","Client meeting","GIS processing","Field validation"],
  months:["Jan","Feb","Mar","Apr","May","Jun"],
  revenueTrend:[12000,15000,14000,18000,16000,17000],
  projectTrend:[2,3,2,4,3,5]
};

// DROPDOWN
function toggleDropdown(){
  const dropdown = document.getElementById('dropdown');
  dropdown.style.display = dropdown.style.display==='block'?'none':'block';
}

// DASHBOARD
function renderDashboard(){
  const active = data.projects.filter(p=>p.status==="Active").length;
  const completion = Math.round(((data.projects.length-active)/data.projects.length)*100);

  document.getElementById('main').innerHTML = `
    <h1>Dashboard</h1>
    <div class="grid">
      <div class="card" onclick="renderProjects()">Total Projects: ${data.projects.length}</div>
      <div class="card" onclick="renderClients()">Clients: ${data.clients.length}</div>
      <div class="card">Revenue: $${data.revenue.toLocaleString()}</div>
      <div class="card" onclick="renderTasks()">Tasks: ${data.tasks.length}</div>
      <div class="card">Completion Rate: ${completion}%</div>
      <div class="card">Active Projects: ${active}</div>
    </div>
    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>
  `;
  renderChart();
}

// CHART
function renderChart(){
  new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels:data.months,
      datasets:[
        {label:'Revenue ($)', data:data.revenueTrend, tension:0.4, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.2)'},
        {label:'Projects', data:data.projectTrend, tension:0.4, borderColor:'#22d3ee', backgroundColor:'rgba(34,211,238,0.2)'}
      ]
    },
    options:{responsive:true, maintainAspectRatio:false, scales:{y:{beginAtZero:true}}}
  });
}

// PROJECTS
function renderProjects(){
  let html = `<button onclick="renderDashboard()">Back</button><h1>Projects</h1><div class="grid">`;
  data.projects.forEach(p=>html+=`<div class="card">${p.name} (${p.status})</div>`);
  html+='</div>';
  document.getElementById('main').innerHTML = html;
}

// CLIENTS
function renderClients(){
  let html = `<button onclick="renderDashboard()">Back</button><h1>Clients</h1><div class="grid">`;
  data.clients.forEach(c=>html+=`<div class="card">${c}</div>`);
  html+='</div>';
  document.getElementById('main').innerHTML = html;
}

// TASKS
function renderTasks(){
  let html = `<button onclick="renderDashboard()">Back</button><h1>Tasks</h1><div class="grid">`;
  data.tasks.forEach(t=>html+=`<div class="card">${t}</div>`);
  html+='</div>';
  document.getElementById('main').innerHTML = html;
}

// REPORTS
function renderReports(){
  const avg = Math.round(data.revenue/data.projects.length);
  document.getElementById('main').innerHTML = `
    <h1>Reports</h1>
    <div class="grid">
      <div class="card">Total Revenue: $${data.revenue.toLocaleString()}</div>
      <div class="card">Avg Revenue/Project: $${avg}</div>
      <div class="card">Total Clients: ${data.clients.length}</div>
    </div>
  `;
}

// INIT
renderDashboard();
</script>

</body>
</html>
